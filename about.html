<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>About | The Study Ledger</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<main class="note-page">

<button class="back-btn" onclick="history.back()">
← Back
</button>

<div class="card note-card">

<h1>About</h1>

<p>
A public record of reading, research and learning.
</p>

<br>

<button id="contactBtn">
Contact
</button>

</div>

</main>

<div class="modal" id="contactModal">

<div class="modal-box">

<h2>Contact</h2>

<p>

<strong>dorrmant</strong> is currently accepting messages through one highly sophisticated communication protocol.

</p>

<br>

<a href="https://ngl.link/dorrmant" target="_blank">

If you wanna talk, then...

</a>

<br><br>

<button id="closeModal">

Close

</button>

</div>

</div>

<script>

const modal=document.getElementById("contactModal");

document.getElementById("contactBtn").onclick=()=>{

modal.classList.add("show");

};

document.getElementById("closeModal").onclick=()=>{

modal.classList.remove("show");

};

window.onclick=e=>{

if(e.target===modal){

modal.classList.remove("show");

}

};

</script>

</body>

</html>
