<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Daily Progress | The Study Ledger</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="daily.css">

</head>

<body>

<header class="page-header">

    <h1>📅 Daily Progress</h1>

    <p>
        A visual record of my study consistency.
    </p>

</header>

<main class="daily-container">

    <section class="calendar-card">

        <div class="calendar-header">

            <button id="prevMonth" aria-label="Previous Month">
                ◀
            </button>

            <h2 id="currentMonth"></h2>

            <button id="nextMonth" aria-label="Next Month">
                ▶
            </button>

        </div>

        <div class="weekday-row">

            <span>Mon</span>
            <span>Tue</span>
            <span>Wed</span>
            <span>Thu</span>
            <span>Fri</span>
            <span>Sat</span>
            <span>Sun</span>

        </div>

        <div id="calendarGrid" class="calendar-grid"></div>

    </section>

</main>

<!-- Tooltip -->

<div id="dayTooltip" class="day-tooltip hidden">

    <h3 id="tipDate"></h3>

    <p id="tipStatus"></p>

    <p id="tipHours"></p>

    <p id="tipPages"></p>

    <div id="tipBooks"></div>

    <p id="tipNotes"></p>

</div>

<script src="daily.js"></script>

</body>

</html>
