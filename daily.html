<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Daily Progress | The Study Ledger</title>
<link rel="manifest" href="manifest.webmanifest">

<meta name="theme-color" content="#0b1020">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="apple-mobile-web-app-title" content="Dorrmant">

<link rel="apple-touch-icon" href="icons/icon-512.png">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="daily.css">

</head>

<body>
<div class="back-container">

    <a href="index.html" class="back-button">
        ← Back to Home
    </a>

</div>
<header class="page-header">

    <h1>📅 Daily Log</h1>

   

</header>

<main class="daily-container">

    <section class="calendar-card">

        <div class="calendar-header">

            <button id="prevMonth" aria-label="Previous Month">
                ◀
            </button>

            <h2 id="currentMonth"></h2>

            <button id="nextMonth" aria-label="Next Month">
                ▶
            </button>

        </div>

        <div class="weekday-row">

            <span>Mon</span>
            <span>Tue</span>
            <span>Wed</span>
            <span>Thu</span>
            <span>Fri</span>
            <span>Sat</span>
            <span>Sun</span>

        </div>

        <div id="calendarGrid" class="calendar-grid"></div>

    </section>

</main>

<!-- Tooltip -->

<div id="dayTooltip" class="day-tooltip hidden">

    <h3 id="tipDate"></h3>

    <p id="tipStatus"></p>

    <p id="tipHours"></p>

    <p id="tipPages"></p>

    <div id="tipBooks"></div>

    <p id="tipNotes"></p>

</div>

<script src="daily.js"></script>

</body>

</html>
