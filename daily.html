<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Daily Progress | The Study Ledger</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header class="page-header">

    <h1>📅 Daily Progress</h1>

    <p>
        A visual record of my study consistency.
    </p>

</header>

<main class="daily-container">

    <section class="calendar-card">

        <div class="calendar-header">

            <button id="prevMonth">
                ◀
            </button>

            <h2 id="currentMonth">
                July 2026
            </h2>

            <button id="nextMonth">
                ▶
            </button>

        </div>

        <div class="weekday-row">

            <span>Mon</span>
            <span>Tue</span>
            <span>Wed</span>
            <span>Thu</span>
            <span>Fri</span>
            <span>Sat</span>
            <span>Sun</span>

        </div>

        <div
            id="calendarGrid"
            class="calendar-grid">

            <!-- Generated by JS -->

        </div>

    </section>

</main>

<!-- Floating tooltip -->

<div
    id="dayTooltip"
    class="day-tooltip hidden">

    <h3 id="tipDate">
        21 Jul 2026
    </h3>

    <p id="tipStatus">
        🟩 Excellent
    </p>

    <p id="tipHours">
        ⏱ 6.5 hours
    </p>

    <p id="tipPages">
        📖 48 pages
    </p>

    <p id="tipBooks">
        📚 Wittgenstein<br>
        📚 Ibn Taymiyyah
    </p>

    <p id="tipNotes">
        📝 2 notes
    </p>

</div>

<script src="daily.js"></script>

</body>
</html>
