<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<button class="menu-toggle" id="menuToggle">
    &#9776;
</button>

<div class="container">

    <aside class="sidebar">

        <div class="logo">

            <h1>The Study Ledger</h1>

            <p>
                My public record of reading and learning.
            </p>

        </div>

        <nav>

            <a href="index.html">Dashboard</a>

            <a class="active" href="library.html">Library</a>

            <a href="daily.html">Daily Log</a>

            <a href="statistics.html">Statistics</a>

            <a href="search.html">Search</a>

            <a href="about.html">About</a>

        </nav>

    </aside>

    <main>

        <header class="hero">

            <h1 class="hero-name">Library</h1>

            <p class="hero-bio">
                My reading archive.
            </p>

        </header>

        <div id="libraryGrid"></div>

    </main>

</div>

<script src="library.js"></script>

<script>

const menuToggle = document.getElementById("menuToggle");
const sidebar = document.querySelector(".sidebar");

if(menuToggle && sidebar){

    menuToggle.addEventListener("click",()=>{

        sidebar.classList.toggle("active");

    });

    document.addEventListener("click",(e)=>{

        if(
            window.innerWidth <= 900 &&
            !sidebar.contains(e.target) &&
            !menuToggle.contains(e.target)
        ){

            sidebar.classList.remove("active");

        }

    });

}

</script>

</body>

</html>
